name: H2O Kernel Builder - main

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      matrix:
        ksu_variant: [non-ksu, ksu]
    steps:
      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm clang llvm lld base-devel bc zip curl openssl git python3 flex bison

      - name: Checkout Kernel
        run: |
          git clone --depth=1 -b main https://github.com/jammbazz/hawaiikernel-a01core kernel_src

      - name: Setup Toolchain
        run: |
          cd kernel_src
          if [ ! -d "arm-linux-androideabi-4.9" ]; then
            git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git arm-linux-androideabi-4.9
          fi
          chmod +x ./arm-linux-androideabi-4.9/bin/* || true

      - name: Setup KernelSU
        if: matrix.ksu_variant == 'ksu'
        run: |
          cd kernel_src
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s v3.0.0-30-legacy
          
          sed -i 's|#define KERNEL_SU_ALLOWLIST "/data/adb/ksu/.allowlist"|#define KERNEL_SU_ALLOWLIST "/data/.allowlist"|g' "$(pwd)/KernelSU/kernel/allowlist.c"
          sed -i 's|O_TRUNC, 0644|O_TRUNC, 0664|g' "$(pwd)/KernelSU/kernel/allowlist.c"
          
          if [ -f "$(pwd)/drivers/kernelsu/sulog/event.c" ]; then
            sed -i '1i #define untagged_addr(x) (x)' "$(pwd)/drivers/kernelsu/sulog/event.c"
          fi

      - name: Build Kernel
        run: |
          cd kernel_src
          sed -i 's/--output-sync/-O/g' Makefile || true
          export ARCH=arm
          export KBUILD_BUILD_USER="jammbazz"
          export KBUILD_BUILD_HOST="Hawaii-Build-Server"
          export CROSS_COMPILE=$(pwd)/arm-linux-androideabi-4.9/bin/arm-linux-androidkernel-
          export KCFLAGS="-O3 -w -fno-stack-protector -fuse-linker-plugin -ftree-vectorize"
          mkdir -p out
          make O=out a01core_defconfig
          make O=out -j$(nproc --all) CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="$KCFLAGS" CONFIG_SECTION_MISMATCH_WARN_ONLY=y

      - name: Repack AnyKernel3
        run: |
          TIME=$(date +%Y%m%d-%H%M)
          git clone --depth=1 -b master https://github.com/jammbazz/AnyKernel3 AnyKernel3
          cp kernel_src/out/arch/arm/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 "../Hawaii-Kernel-R1-${{ matrix.ksu_variant }}-$TIME.zip" * -x .git *.zip README.md *placeholder

      - name: Upload Kernel
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Hawaii-Kernel-R2-${{ matrix.ksu_variant }}
          path: "*.zip"
